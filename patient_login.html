<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login - CareConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-heart-pulse"></i>
            Care<span>Connect</span>
        </a>
        <a href="index.html" class="btn btn-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </nav>

    <div class="login-container">
        <div class="card login-card animate-fade-in" style="border-top: 4px solid var(--secondary-green);">
            <div class="login-header">
                <div class="role-icon"
                    style="width: 70px; height: 70px; font-size: 2rem; margin: 0 auto 1rem auto; color: var(--secondary-green); background: #ecfdf5;">
                    <i class="fa-solid fa-hospital-user"></i>
                </div>
                <h2>Patient Login</h2>
                <p class="text-muted">Welcome back! Please login to your account.</p>
            </div>

            <form onsubmit="handleLogin(event)">

                <div class="form-group">
                    <label for="patient-email" class="form-label">Email</label>
                    <input type="text" id="patient-email" class="form-input" placeholder="e.g. john@example.com"
                        required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div id="error-msg" style="color: #ef4444; font-size: 0.875rem; display: none; margin-bottom: 1rem;">
                    <i class="fa-solid fa-circle-exclamation"></i> Customer not found.
                </div>

                <button type="submit" class="btn btn-primary"
                    style="background-color: var(--secondary-green);">Login</button>
            </form>

            <div class="register-prompt">
                <p>Test Creds: <strong>john@example.com</strong> / Any pass</p>
                <div style="margin-top: 0.5rem;">
                    <p>New to CareConnect? <a href="#" class="btn-link"
                            style="color: var(--secondary-green); font-weight: 600;">Register New Patient</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('patient-email').value;
            const errorMsg = document.getElementById('error-msg');

            const db = getDB();
            const patient = db.users.patients.find(p => p.email === email);

            if (patient) {
                // ADDED: Session Management
                loginUser({ ...patient, role: 'patient' });
                window.location.href = 'patient_dashboard.html';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Patient not found. Try <b>john@example.com</b>';
            }
        }
    </script>

</body>

</html>
